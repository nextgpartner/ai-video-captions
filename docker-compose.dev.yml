services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - caption-data:/app/data
    environment:
      - FRONTEND_URL=http://localhost:3000
      - MAX_FILE_SIZE_MB=500
      - MAX_CONCURRENT_JOBS=4
      - FLASK_DEBUG=true
    command: python app.py
    restart: unless-stopped

volumes:
  caption-data:
